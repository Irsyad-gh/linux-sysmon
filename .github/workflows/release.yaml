# .github/workflows/release.yaml
# Triggered ONLY on push tags beginning with "v" (example: v1.0.0, v2.3.1)
#
# Usage:
#   git tag v1.3.0
#   git push origin v1.3.0
#
# What happens automatically:
#   1. Build sysmon-x64, sysmon-x86, sysmon-arm64
#   2. Save to the build/ directory
#   3. Create a GitHub Release for that tag
#   4. Upload 3 binaries as release assets
#   5. Release notes are generated automatically by GitHub

name: Release

on:
  push:
    tags:
      - "v*"   # only tags starting with letter v

permissions:
  contents: write   # required to create release and upload assets

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build all architectures
  # ──────────────────────────────────────────────
  build:
    name: Cross-compile (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: x64
            make_target: all       # make all → native x86_64
            output_name: sysmon-x64

          - arch: x86
            make_target: x86       # make x86 → -m32
            output_name: sysmon-x86
            extra_packages: gcc-multilib  # required for 32-bit build

          - arch: arm64
            make_target: arm64     # make arm64 → aarch64-linux-gnu-gcc
            output_name: sysmon-arm64
            extra_packages: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make ${{ matrix.extra_packages }}

      - name: Build ${{ matrix.arch }}
        run: make ${{ matrix.make_target }}

      - name: Rename binary & move to build/
        run: |
          mkdir -p build
          cp sysmon build/${{ matrix.output_name }}
          ls -lh build/

      - name: Verify binary
        run: file build/${{ matrix.output_name }}

      # Upload binary as artifact between jobs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: build/${{ matrix.output_name }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Create GitHub Release
  # Runs after all build jobs are complete
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build   # wait for all matrix build jobs to finish first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download all binaries uploaded by the build job
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/
          merge-multiple: true

      - name: Show build/ directory contents
        run: ls -lh build/

      # Create release with automatic release notes from GitHub
      # generate_release_notes: true → GitHub automatically generates from commits & PRs
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}       # tag you pushed, e.g. v1.3.0
          name: "Release ${{ github.ref_name }}" # release title
          generate_release_notes: true           # release notes AUTOMATICALLY from GitHub
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
          files: |
            build/sysmon-x64
            build/sysmon-x86
            build/sysmon-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}