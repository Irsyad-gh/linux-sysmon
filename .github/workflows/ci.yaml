# .github/workflows/ci.yaml
# Triggered on push to ANY branch (except tags)
# Build & test only — no release

name: CI

on:
  push:
    branches:
      - "**"        # all branches
    tags-ignore:
      - "v*"        # ignore version tag pushes so release.yml handles them

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test (native x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build (native x64)
        run: make

      - name: Verify binary exists
        run: |
          ls -lh ./sysmon
          file ./sysmon

      - name: Smoke test — binary can run
        run: |
          timeout 6 ./sysmon || true
          echo "Smoke test complete"