name: CI - Cross Compile (x86_64, x86, aarch64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64
            cc: gcc
            make_target: all
            install: ""

          - target: x86
            cc: gcc
            make_target: x86
            install: "gcc-multilib libc6-dev-i386"

          - target: aarch64
            cc: aarch64-linux-gnu-gcc
            make_target: arm64
            install: "gcc-aarch64-linux-gnu"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compilers
        if: matrix.install != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.install }}

      - name: Build ${{ matrix.target }}
        run: |
          echo "Building for ${{ matrix.target }} using CC=${{ matrix.cc }}"
          make clean
          CC=${{ matrix.cc }} make ${{ matrix.make_target }}
          ls -lh sysmon
          file sysmon

      - name: Test Binary
        run: |
          echo "=== Testing ${{ matrix.target }} binary ==="
          ./sysmon --help || echo "✅ Binary executable (--help mungkin belum ada)"
          timeout 5s ./sysmon --one-shot || echo "✅ One-shot test completed"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysmon-${{ matrix.target }}
          path: ./sysmon
          retention-days: 14